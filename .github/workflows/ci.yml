# PR / main gate for Pulse: clippy (deny warnings) + the full test suite,
# on windows-latest because this is a Windows-native app (ConPTY, Win32,
# Direct2D) - it does not compile elsewhere.
#
# `cargo fmt --check` is deliberately absent: the repo has no rustfmt config
# and the tree is not rustfmt-clean, so the gate would force an unrelated
# whole-tree reformat. Add it only after a dedicated formatting pass.
#
# Org policy: every action must be pinned to a full-length commit SHA
# (workflows referencing floating tags are refused).

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Newer pushes to the same ref supersede in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Repo-hygiene meta-lint (privacy tripwires, encoding, old-brand, release
  # placeholders, large/generated files). Mirrors the .githooks pre-commit
  # hook so a locally bypassed hook (--no-verify) still fails the PR gate.
  # Pure greps/file checks - finishes in seconds, no toolchain needed.
  meta-lint:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Meta-lint (full tree)
        shell: pwsh
        run: ./scripts/meta-lint.ps1 --all

  test:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Rust toolchain (stable + clippy)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-nextest
        # Prebuilt binary (no compile). nextest runs each test in its own
        # process with a per-test wall-clock timeout (.config/nextest.toml), so
        # a wedged ConPTY/daemon test is force-killed in seconds instead of
        # riding this job's 60-minute cap.
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: nextest

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test (release, nextest ci profile)
        # --release matches the local house rule (and the release workflow),
        # so CI green means the shipped profile is green. The `ci` nextest
        # profile adds one retry for runner-timing flakiness and the per-test
        # hang guard. The crate has no doc tests, so no `--doc` step is needed.
        run: cargo nextest run --release --profile ci
